# Full backend stack. `docker compose up` brings up Postgres, Redis, Qdrant, and
# the API (which runs migrations on start). The frontend deploys to Vercel or via
# frontend/Dockerfile. Dev without Docker defaults to SQLite + eager Celery.

services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://luma:luma@postgres:5432/luma
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      SECRET_KEY: change-me-in-production
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started


  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: luma
      POSTGRES_PASSWORD: luma
      POSTGRES_DB: luma
    ports:
      - "5432:5432"
    volumes:
      - luma_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luma"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Vector DB for semantic search (Phase 6+).
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - luma_qdrant:/qdrant/storage

volumes:
  luma_pg:
  luma_qdrant:
