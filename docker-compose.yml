# Production-like local stack. Dev defaults to SQLite (no services needed);
# bring these up when you want to run against Postgres/Redis/Qdrant.
#
#   docker compose up -d
#   DATABASE_URL=postgresql+asyncpg://luma:luma@localhost:5432/luma \
#     ./backend/.venv/bin/alembic upgrade head

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: luma
      POSTGRES_PASSWORD: luma
      POSTGRES_DB: luma
    ports:
      - "5432:5432"
    volumes:
      - luma_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luma"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Vector DB for semantic search (Phase 6+).
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - luma_qdrant:/qdrant/storage

volumes:
  luma_pg:
  luma_qdrant:
